<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <title>Acesso Restrito | EL SHADDAY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .login-card {
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen flex items-center justify-center p-4 relative">

    <a href="/"
        class="absolute top-6 right-6 flex items-center gap-2 text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-blue-600 transition-colors group">
        <i data-lucide="arrow-left" class="w-4 h-4 group-hover:-translate-x-1 transition-transform"></i>
        Voltar para o Início
    </a>

    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <div
                class="bg-blue-600 w-16 h-16 rounded-2xl text-white flex items-center justify-center mx-auto shadow-xl shadow-blue-100 mb-4 animate-bounce">
                <i data-lucide="shield-check" class="w-10 h-10"></i>
            </div>
            <h2 class="text-3xl font-black text-slate-800 tracking-tighter uppercase italic">
                EL SHADDAY <span class="text-blue-600">Integridade</span>
            </h2>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.3em] mt-1">Painel Administrativo v2.0
            </p>
        </div>

        <div
            class="bg-white p-8 rounded-[2.5rem] shadow-2xl shadow-slate-200 border border-white relative overflow-hidden">

            <div class="absolute top-0 left-0 w-full h-1.5 bg-blue-600"></div>

            {% if erro %}
            <div class="mb-6 bg-red-50 border border-red-100 p-4 rounded-2xl flex items-center gap-3">
                <div class="bg-red-500 p-1.5 rounded-lg text-white">
                    <i data-lucide="alert-circle" class="w-4 h-4"></i>
                </div>
                <p class="text-xs text-red-700 font-bold">{{ erro }}</p>
            </div>
            {% endif %}

            <form action="/login" method="POST" class="space-y-5">
                <div>
                    <label
                        class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Usuário
                        de Acesso</label>
                    <div class="relative group">
                        <div
                            class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-600 transition-colors">
                            <i data-lucide="user" class="w-4 h-4"></i>
                        </div>
                        <input type="text" name="user" required
                            class="block w-full pl-11 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-semibold outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all placeholder:text-slate-300"
                            placeholder="ex: admin_comite">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Chave
                        de Segurança</label>
                    <div class="relative group">
                        <div
                            class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-600 transition-colors">
                            <i data-lucide="lock" class="w-4 h-4"></i>
                        </div>
                        <input type="password" name="pass" required
                            class="block w-full pl-11 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-semibold outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all placeholder:text-slate-300"
                            placeholder="••••••••••••">
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit"
                        class="w-full bg-slate-900 hover:bg-black text-white font-bold py-5 rounded-2xl transition-all shadow-lg shadow-slate-200 flex items-center justify-center gap-3 uppercase text-xs tracking-[0.2em] active:scale-[0.97]">
                        Autenticar Acesso <i data-lucide="chevron-right" class="w-4 h-4 text-blue-400"></i>
                    </button>
                </div>
            </form>
        </div>

        <div class="mt-10 text-center">
            <div
                class="flex items-center justify-center gap-2 opacity-30 grayscale hover:grayscale-0 transition cursor-default">
                <i data-lucide="layers" class="w-3 h-3 text-slate-900"></i>
                <p class="text-[10px] font-bold uppercase italic tracking-widest text-slate-900">
                    CodeTecx <span class="font-normal not-italic tracking-normal">Company</span>
                </p>
            </div>
        </div>
    </div>

    <script>
        // Inicializa os ícones do Lucide
        lucide.createIcons();
    </script>
</body>

</html>
